<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaPicker — Modern Color Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
</head>

<style>

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --accent: #f59e0b;
    --dark: #0f172a;
    --dark-light: #1e293b;
    --gray-light: #e2e8f0;
    --gray: #94a3b8;
    --success: #10b981;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: #fff;
}

.container {
    width: 100%;
    max-width: 500px;
}

.card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.header {
    text-align: center;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header p {
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.preview-container {
    margin-bottom: 30px;
}

.preview {
    width: 100%;
    height: 280px;
    border-radius: 16px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    border: 2px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
}

.preview:hover {
    transform: scale(1.02);
    box-shadow: 0 25px 50px rgba(99, 102, 241, 0.4);
}

.preview::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
    pointer-events: none;
    border-radius: 16px;
}

.color-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
}

.color-value {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gray-light);
    word-break: break-all;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.color-value:hover {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--primary);
}

.color-value.active::after {
    content: '✓ Copied!';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(16, 185, 129, 0.2);
    border: 1px solid var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--success);
    animation: fadeInOut 2s ease-out;
}

@keyframes fadeInOut {
    0% {
        opacity: 1;
    }
    70% {
        opacity: 1;
    }
    100% {
        opacity: 0;
        pointer-events: none;
    }
}

.controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-group {
    display: flex;
    gap: 8px;
    align-items: center;
}

.code {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 14px 16px;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    transition: all 0.3s ease;
}

.code::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

.code:focus {
    outline: none;
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.code-copy {
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid var(--primary);
    color: var(--primary);
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.code-copy:hover {
    background: var(--primary);
    color: #fff;
    transform: translateY(-2px);
}

.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.btn {
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2);
    transition: left 0.3s ease;
    z-index: 0;
}

.btn:hover::before {
    left: 100%;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    grid-column: span 2;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
}

.btn-secondary {
    background: rgba(236, 72, 153, 0.15);
    border: 1px solid rgba(236, 72, 153, 0.5);
    color: #ec4899;
}

.btn-secondary:hover {
    background: rgba(236, 72, 153, 0.25);
    border-color: #ec4899;
    transform: translateY(-2px);
}

.btn i {
    font-size: 16px;
    z-index: 1;
}

.history {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.history h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

.history-colors {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.history-swatch {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.history-swatch:hover {
    transform: scale(1.1);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

.shortcuts {
    margin-top: 24px;
    padding: 16px;
    background: rgba(99, 102, 241, 0.05);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 12px;
    font-size: 11px;
    color: var(--gray);
}

.shortcuts p {
    margin-bottom: 6px;
}

.shortcuts kbd {
    background: rgba(255, 255, 255, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    color: var(--gray-light);
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(16, 185, 129, 0.2);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    animation: slideIn 0.4s ease-out;
    z-index: 1000;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@media (max-width: 600px) {
    .card {
        padding: 28px;
    }

    .preview {
        height: 220px;
    }

    .color-info {
        grid-template-columns: 1fr;
    }

    .buttons {
        grid-template-columns: 1fr;
    }

    .btn-primary {
        grid-column: span 1;
    }
}

</style>


<script>
class ColorPicker {
    constructor() {
        this.preview = document.getElementById('preview');
        this.codeInput = document.getElementById('code-input');
        this.randomBtn = document.getElementById('random-btn');
        this.lockBtn = document.getElementById('lock-btn');
        this.clearBtn = document.getElementById('clear-btn');
        this.pasteBtn = document.getElementById('paste-btn');
        this.historyContainer = document.getElementById('history');
        
        this.currentColor = '#6366f1';
        this.isLocked = false;
        this.history = [];
        
        this.init();
    }

    init() {
        this.setupEventListeners();
        this.loadFromLocalStorage();
        this.setColor(this.currentColor);
    }

    setupEventListeners() {
        this.randomBtn.addEventListener('click', () => this.generateRandom());
        this.lockBtn.addEventListener('click', () => this.toggleLock());
        this.clearBtn.addEventListener('click', () => this.clear());
        this.pasteBtn.addEventListener('click', () => this.pasteFromClipboard());
        this.preview.addEventListener('click', () => this.copyToClipboard(this.currentColor));
        this.codeInput.addEventListener('input', (e) => this.handleColorInput(e.target.value));
        
        // Color value copy handlers
        document.querySelectorAll('.color-value').forEach(el => {
            el.addEventListener('click', (e) => {
                const format = e.currentTarget.dataset.format;
                const colorValue = document.getElementById(format).textContent;
                this.copyToClipboard(colorValue);
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                this.generateRandom();
            }
            if (e.key.toLowerCase() === 'c') {
                this.copyToClipboard(this.currentColor);
            }
            if (e.key.toLowerCase() === 'l') {
                this.toggleLock();
            }
        });
    }

    /**
     * Generate a random color
     */
    generateRandom() {
        if (this.isLocked) return;
        
        const hex = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        this.setColor(hex);
        this.addToHistory(hex);
    }

    /**
     * Set the color and update all displays
     */
    setColor(color) {
        try {
            const hex = this.normalizeToHex(color);
            if (!hex) {
                this.showError('Invalid color');
                return;
            }
            
            this.currentColor = hex;
            this.preview.style.backgroundColor = hex;
            this.updateColorDisplay(hex);
            this.saveToLocalStorage();
        } catch (error) {
            this.showError('Invalid color format');
        }
    }

    /**
     * Normalize any color format to HEX
     */
    normalizeToHex(color) {
        color = color.trim();
        
        // Already hex
        if (/^#[0-9A-F]{6}$/i.test(color)) {
            return color.toUpperCase();
        }
        
        // RGB format: rgb(99, 102, 241)
        const rgbMatch = color.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
        if (rgbMatch) {
            const r = parseInt(rgbMatch[1]).toString(16).padStart(2, '0');
            const g = parseInt(rgbMatch[2]).toString(16).padStart(2, '0');
            const b = parseInt(rgbMatch[3]).toString(16).padStart(2, '0');
            return '#' + (r + g + b).toUpperCase();
        }
        
        // Named colors
        const canvas = document.createElement('canvas');
        canvas.width = 1;
        canvas.height = 1;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = color;
        if (ctx.fillStyle !== color && !color.startsWith('#')) {
            return null;
        }
        
        return null;
    }

    /**
     * Convert HEX to RGB object
     */
    hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }

    /**
     * Convert HEX to HSL object
     */
    hexToHsl(hex) {
        const rgb = this.hexToRgb(hex);
        if (!rgb) return null;
        
        let r = rgb.r / 255;
        let g = rgb.g / 255;
        let b = rgb.b / 255;
        
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) {
            h = s = 0;
        } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            
            switch (max) {
                case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                case g: h = ((b - r) / d + 2) / 6; break;
                case b: h = ((r - g) / d + 4) / 6; break;
            }
        }

        return {
            h: Math.round(h * 360),
            s: Math.round(s * 100),
            l: Math.round(l * 100)
        };
    }

    /**
     * Update all color format displays (HEX, RGB, RGBA, HSL)
     */
    updateColorDisplay(hex) {
        const rgb = this.hexToRgb(hex);
        const hsl = this.hexToHsl(hex);
        
        document.getElementById('hex').textContent = hex;
        document.getElementById('rgb').textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        document.getElementById('rgba').textContent = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 1)`;
        document.getElementById('hsl').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        
        this.codeInput.value = hex;
    }

    /**
     * Handle input field changes
     */
    handleColorInput(value) {
        if (value.trim()) {
            this.setColor(value);
        }
    }

    /**
     * Toggle lock state to prevent random generation
     */
    toggleLock() {
        this.isLocked = !this.isLocked;
        this.lockBtn.classList.toggle('active');
        this.lockBtn.innerHTML = this.isLocked 
            ? '<i class="fas fa-lock"></i> Locked'
            : '<i class="fas fa-lock-open"></i> Lock';
    }

    /**
     * Clear everything and reset to default
     */
    clear() {
        this.setColor('#6366f1');
        this.history = [];
        this.renderHistory();
        this.saveToLocalStorage();
    }

    /**
     * Add a color to history (prevent duplicates, limit to 8)
     */
    addToHistory(color) {
        this.history = [color, ...this.history.filter(c => c !== color)].slice(0, 8);
        this.renderHistory();
        this.saveToLocalStorage();
    }

    /**
     * Render color swatches from history
     */
    renderHistory() {
        this.historyContainer.innerHTML = '';
        this.history.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'history-swatch';
            swatch.style.backgroundColor = color;
            swatch.addEventListener('click', () => this.setColor(color));
            this.historyContainer.appendChild(swatch);
        });
    }

    /**
     * Copy text to clipboard
     */
    copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            this.showToast(`Copied: ${text}`);
        }).catch(err => {
            console.error('Failed to copy:', err);
        });
    }

    /**
     * Paste from clipboard
     */
    async pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            this.codeInput.value = text;
            this.handleColorInput(text);
        } catch (err) {
            this.showError('Failed to paste from clipboard');
        }
    }

    /**
     * Show success toast notification
     */
    showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    /**
     * Show error notification
     */
    showError(message) {
        this.showToast(`⚠ ${message}`);
    }

    /**
     * Save state to localStorage
     */
    saveToLocalStorage() {
        localStorage.setItem('colorPickerState', JSON.stringify({
            color: this.currentColor,
            history: this.history,
            locked: this.isLocked
        }));
    }

    /**
     * Load state from localStorage
     */
    loadFromLocalStorage() {
        const saved = localStorage.getItem('colorPickerState');
        if (saved) {
            const state = JSON.parse(saved);
            this.currentColor = state.color;
            this.history = state.history;
            this.isLocked = state.locked;
            this.renderHistory();
            if (this.isLocked) this.toggleLock();
        }
    }
}

// Initialize the app when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
    new ColorPicker();
});

</script>

  
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>ChromaPicker</h1>
                <p>Modern Color Generator</p>
            </div>

            <div class="preview-container">
                <div class="preview" id="preview"></div>
                <div class="color-info">
                    <div class="color-value" data-format="hex" title="Click to copy">
                        <span id="hex">#6366f1</span>
                    </div>
                    <div class="color-value" data-format="rgb" title="Click to copy">
                        <span id="rgb">rgb(99, 102, 241)</span>
                    </div>
                    <div class="color-value" data-format="rgba" title="Click to copy">
                        <span id="rgba">rgba(99, 102, 241, 1)</span>
                    </div>
                    <div class="color-value" data-format="hsl" title="Click to copy">
                        <span id="hsl">hsl(238, 89%, 67%)</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <label for="code-input">Custom Color Code</label>
                <div class="input-group">
                    <input type="text" id="code-input" class="code" placeholder="#6366f1 or rgb(99,102,241)">
                    <button class="code-copy" id="paste-btn" title="Paste from clipboard">
                        <i class="fas fa-paste"></i>
                    </button>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-secondary" id="lock-btn" title="Spacebar to toggle">
                    <i class="fas fa-lock-open"></i> Lock
                </button>
                <button class="btn btn-secondary" id="clear-btn" title="Reset to default">
                    <i class="fas fa-trash"></i> Clear
                </button>
                <button class="btn btn-primary" id="random-btn" title="Spacebar">
                    <i class="fas fa-dice"></i> Generate Random
                </button>
            </div>

            <div class="history">
                <h3>Recent Colors</h3>
                <div class="history-colors" id="history"></div>
            </div>

            <div class="shortcuts">
                <p><kbd>Space</kbd> — Generate random color</p>
                <p><kbd>C</kbd> — Copy current color</p>
                <p><kbd>L</kbd> — Lock/unlock generator</p>
            </div>
        </div>
    </div>

    
</body>
</html>
