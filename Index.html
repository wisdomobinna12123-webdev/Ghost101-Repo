<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaPicker — Modern Color Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>ChromaPicker</h1>
                <p>Modern Color Generator</p>
            </div>

            <div class="preview-container">
                <div class="preview" id="preview"></div>
                <div class="color-info">
                    <div class="color-value" data-format="hex" title="Click to copy">
                        <span id="hex">#6366f1</span>
                    </div>
                    <div class="color-value" data-format="rgb" title="Click to copy">
                        <span id="rgb">rgb(99, 102, 241)</span>
                    </div>
                    <div class="color-value" data-format="rgba" title="Click to copy">
                        <span id="rgba">rgba(99, 102, 241, 1)</span>
                    </div>
                    <div class="color-value" data-format="hsl" title="Click to copy">
                        <span id="hsl">hsl(238, 89%, 67%)</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <label for="code-input">Custom Color Code</label>
                <div class="input-group">
                    <input type="text" id="code-input" class="code" placeholder="#6366f1 or rgb(99,102,241)">
                    <button class="code-copy" id="paste-btn" title="Paste from clipboard">
                        <i class="fas fa-paste"></i>
                    </button>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-secondary" id="lock-btn" title="Spacebar to toggle">
                    <i class="fas fa-lock-open"></i> Lock
                </button>
                <button class="btn btn-secondary" id="clear-btn" title="Reset to default">
                    <i class="fas fa-trash"></i> Clear
                </button>
                <button class="btn btn-primary" id="random-btn" title="Spacebar">
                    <i class="fas fa-dice"></i> Generate Random
                </button>
            </div>

            <div class="history">
                <h3>Recent Colors</h3>
                <div class="history-colors" id="history"></div>
            </div>

            <div class="shortcuts">
                <p><kbd>Space</kbd> — Generate random color</p>
                <p><kbd>C</kbd> — Copy current color</p>
                <p><kbd>L</kbd> — Lock/unlock generator</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
